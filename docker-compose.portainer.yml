services:
  myastroboard:
    image: worldofgz/myastroboard:latest
    pull_policy: always
    container_name: myastroboard

    ports:
      - "5000:5000"

    volumes:
      - myastroboard_data:/app/data

    environment:
      # Timezone
      - TZ=Europe/Paris

      # Flask
      - FLASK_DEBUG=0

      # Security - Flask secret key for session management
      # Generate: python3 -c "import secrets; print(secrets.token_hex(32))"
      - SECRET_KEY=your-secret-key-here-replace-with-random-64-character-hex-string

      # Reverse Proxy Configuration (NGINX Proxy Manager, Traefik, etc.)
      # Set to true if behind a reverse proxy with HTTPS termination
      - TRUST_PROXY_HEADERS=true

      # Session cookie security
      # Set to "true" when using HTTPS
      - SESSION_COOKIE_SECURE=false

      # Push notifications - VAPID contact email
      # Required for background push notifications (especially Apple APNs on iOS).
      # Set to any real email address - it is sent to push services as a contact address,
      # not shown to users. The domain does not need to match your app's domain.
      # Without this, iOS push notifications will be silently rejected by Apple.
      - VAPID_CONTACT_EMAIL=your-email@example.com

      # App
      - DATA_DIR=/app/data

    restart: unless-stopped

    privileged: false

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  myastroboard_data:
    driver: local
