[pytest]
# Pytest configuration for MyAstroBoard

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Python files
python_files = test_*.py

# Python classes
python_classes = Test*

# Python functions
python_functions = test_*

# Add options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that may require external services
    slow: Slow running tests
