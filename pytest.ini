[pytest]
# Pytest configuration for MyAstroBoard

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Python files
python_files = test_*.py

# Python classes
python_classes = Test*

# Python functions
python_functions = test_*

# Add options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that may require external services
    slow: Slow running tests

# Warning filters
# skyfield 1.54 (latest as of writing) sets a NumPy array's .dtype directly in
# searchlib.py, which NumPy 2.5 deprecated. It's third-party code we can't patch
# in-repo and fires from many unrelated call sites (any find_discrete/find_events
# search), so it's ignored narrowly by module+message rather than muted per call site.
filterwarnings =
    ignore:Setting the dtype on a NumPy array has been deprecated in NumPy 2\.5:DeprecationWarning:skyfield\.searchlib
