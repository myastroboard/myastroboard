name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: myastroboard/myastroboard
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux-amd64
          - platform: linux/arm64
            platform_slug: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          if ! [[ "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=MyAstroBoard
            org.opencontainers.image.description=Self-hosted astronomy dashboard for observation planning and astrophotography
            org.opencontainers.image.url=https://github.com/myastroboard/myastroboard
            org.opencontainers.image.source=https://github.com/myastroboard/myastroboard
            org.opencontainers.image.licenses=AGPL-3.0
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/myastroboard/myastroboard/main/DOCKER_HUB.md
            io.artifacthub.package.logo-url=https://raw.githubusercontent.com/myastroboard/myastroboard/main/static/ico/ios/512.png
            io.artifacthub.package.keywords=astronomy,astrophotography,self-hosted,dashboard,skytonight
            io.artifacthub.package.maintainers=[{"name":"WorldOfGZ","email":"myastroboard@outlook.com"}]
            io.artifacthub.package.license=AGPL-3.0
          annotations: |
            manifest:org.opencontainers.image.description=Self-hosted astronomy dashboard for observation planning and astrophotography
            manifest:org.opencontainers.image.title=MyAstroBoard

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Avoid internal actions/cache usage pinned to a Node 20-targeted revision.
          cache-binary: false

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.platform_slug }}-build
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.platform_slug }}
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.platform_slug }}
          cache-to: |
            type=gha,scope=${{ matrix.platform_slug }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.platform_slug }},mode=max

  merge-and-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          if ! [[ "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          DOCKERHUB_IMAGE: ${{ env.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail

          DESC="Self-hosted astronomy dashboard for observation planning and astrophotography"
          
          ANNOTATIONS=(
            --annotation "index:org.opencontainers.image.title=MyAstroBoard"
            --annotation "index:org.opencontainers.image.description=$DESC"
            --annotation "index:org.opencontainers.image.url=https://github.com/myastroboard/myastroboard"
            --annotation "index:org.opencontainers.image.source=https://github.com/myastroboard/myastroboard"
            --annotation "index:org.opencontainers.image.licenses=AGPL-3.0"
            --annotation "index:org.opencontainers.image.version=$VERSION"
            --annotation "manifest-descriptor:org.opencontainers.image.title=MyAstroBoard"
            --annotation "manifest-descriptor:org.opencontainers.image.description=$DESC"
            --annotation "manifest-descriptor:org.opencontainers.image.url=https://github.com/myastroboard/myastroboard"
            --annotation "manifest-descriptor:org.opencontainers.image.source=https://github.com/myastroboard/myastroboard"
            --annotation "manifest-descriptor:org.opencontainers.image.licenses=AGPL-3.0"
            --annotation "manifest-descriptor:org.opencontainers.image.version=$VERSION"
          )

          echo "Creating and pushing multi-arch manifest to ghcr.io..."
          docker buildx imagetools create "${ANNOTATIONS[@]}" \
            -t "$REGISTRY/$IMAGE_NAME:latest" \
            -t "$REGISTRY/$IMAGE_NAME:$VERSION" \
            -t "$REGISTRY/$IMAGE_NAME:${VERSION%.*}" \
            -t "$REGISTRY/$IMAGE_NAME:${VERSION%%.*}" \
            "$REGISTRY/$IMAGE_NAME:linux-amd64-build" \
            "$REGISTRY/$IMAGE_NAME:linux-arm64-build"

          echo "Creating and pushing multi-arch manifest to Docker Hub..."
          docker buildx imagetools create "${ANNOTATIONS[@]}" \
            -t "$DOCKERHUB_IMAGE:latest" \
            -t "$DOCKERHUB_IMAGE:$VERSION" \
            -t "$DOCKERHUB_IMAGE:${VERSION%.*}" \
            -t "$DOCKERHUB_IMAGE:${VERSION%%.*}" \
            "$REGISTRY/$IMAGE_NAME:linux-amd64-build" \
            "$REGISTRY/$IMAGE_NAME:linux-arm64-build"

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 0

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git tag --sort=-version:refname | sed -n 2p)

          echo "## 🚀 What's Changed" > release_notes.md

          # Inject changelog if the file exists and is not empty
          if [ -s "CHANGELOG_NEXT.md" ]; then
            echo "" >> release_notes.md
            echo "### 📝 Changelog" >> release_notes.md
            cat CHANGELOG_NEXT.md >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "### 📋 Commits since $PREVIOUS_TAG:" >> release_notes.md
            git log "$PREVIOUS_TAG..$CURRENT_TAG" \
              --reverse --date-order \
              --pretty=format:"- %s (%an) - %h" \
              --invert-grep --grep="Merge" >> release_notes.md
          else
            echo "### 📋 Initial Release Commits:" >> release_notes.md
            git log --reverse --date-order \
              --pretty=format:"- %s (%an) - %h" \
              --invert-grep --grep="Merge" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "## 🐳 Docker Images" >> release_notes.md
          echo "" >> release_notes.md
          echo "### GitHub Container Registry (ghcr.io)" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull ghcr.io/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}" >> release_notes.md
          echo "docker pull ghcr.io/${{ steps.image.outputs.name }}:latest" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Docker Hub" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull myastroboard/myastroboard:${{ steps.version.outputs.VERSION }}" >> release_notes.md
          echo "docker pull myastroboard/myastroboard:latest" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Supported platforms" >> release_notes.md
          echo "| Platform | Architecture |" >> release_notes.md
          echo "|----------|-------------|" >> release_notes.md
          echo "| \`linux/amd64\` | x86_64 (PC, serveur) |" >> release_notes.md
          echo "| \`linux/arm64\` | ARM 64-bit (Raspberry Pi 4/5, Apple Silicon) |" >> release_notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

