name: Post-Release Cleanup

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to clean up (e.g. 0.8.1) — leave empty to use latest tag'
        required: false

jobs:
  clear-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG=$(git tag --sort=-version:refname | head -1)
          fi
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create branch and PR to clear CHANGELOG_NEXT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BRANCH="bot/post-release-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          truncate -s 0 CHANGELOG_NEXT.md
          git add CHANGELOG_NEXT.md

          if git diff --staged --quiet; then
            echo "CHANGELOG_NEXT.md is already empty, nothing to do."
            exit 0
          fi

          git commit -m "chore: clear CHANGELOG_NEXT after release v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: clear CHANGELOG_NEXT after release v${VERSION}" \
            --body "Automated cleanup after tagging release v${VERSION}." \
            --base main \
            --head "$BRANCH"
