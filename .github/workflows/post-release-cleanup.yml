name: Post-Release Cleanup

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Build and Publish Docker Image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to clean up (e.g. 0.8.1) - leave empty to use latest tag'
        required: false

jobs:
  clear-changelog:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ -n "${{ github.event.workflow_run.head_branch }}" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG=$(git tag --sort=-version:refname | head -1)
          fi

          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG=$(git tag --sort=-version:refname | head -1)
          fi

          if [ -z "$TAG" ]; then
            echo "No valid release tag found."
            exit 1
          fi

          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create branch and PR to clear CHANGELOG_NEXT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BRANCH="bot/post-release-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          truncate -s 0 CHANGELOG_NEXT.md
          git add CHANGELOG_NEXT.md

          if git diff --staged --quiet; then
            echo "CHANGELOG_NEXT.md is already empty, nothing to do."
            exit 0
          fi

          git commit -m "chore: clear CHANGELOG_NEXT after release v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: clear CHANGELOG_NEXT after release v${VERSION}" \
            --body "Automated cleanup after tagging release v${VERSION}." \
            --base main \
            --head "$BRANCH"
