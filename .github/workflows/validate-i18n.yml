name: Validate i18n

on:
  push:
    paths:
      - 'static/i18n/*.json'
      - 'static/manifest.*.webmanifest'
      - 'static/manifest.webmanifest'
      - 'templates/index.html'
      - 'backend/i18n_utils.py'
      - 'scripts/validate_i18n.py'
  pull_request:
    paths:
      - 'static/i18n/*.json'
      - 'static/manifest.*.webmanifest'
      - 'static/manifest.webmanifest'
      - 'templates/index.html'
      - 'backend/i18n_utils.py'
      - 'scripts/validate_i18n.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-i18n:
    name: i18n consistency checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate i18n consistency
        run: python scripts/validate_i18n.py

      - name: Report translation completeness
        run: python scripts/translate_checker.py
