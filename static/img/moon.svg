<svg id="moon-phase" viewBox="0 0 100 100" width="120" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="moon-disc-clip">
    <circle cx="50" cy="50" r="44"/>
  </clipPath>

  <!-- white = show shadow overlay, black = lit region (no shadow) -->
  <mask id="shadow-mask">
    <rect width="100" height="100" fill="white"/>
    <path id="lit-region" d="" fill="black"/>
  </mask>
</defs>

<!-- Base moon texture always fully visible -->
<image
  href="/static/img/textures/moon.jpg"
  x="0"
  y="0"
  width="100"
  height="100"
  preserveAspectRatio="xMidYMid slice"
  clip-path="url(#moon-disc-clip)"
/>

<!-- Shadow darkens the unlit region -->
<circle
  cx="50"
  cy="50"
  r="44"
  fill="#000000"
  fill-opacity="0.70"
  clip-path="url(#moon-disc-clip)"
  mask="url(#shadow-mask)"
/>
</svg>
