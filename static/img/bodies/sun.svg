    </defs>
    <rect width="200" height="200" fill="#120a06" />
    <circle cx="100" cy="100" r="96" fill="url(#sun-corona)" />
    <circle cx="100" cy="100" r="62" fill="url(#sun-disc)" />
    <g clip-path="url(#sun-clip)" fill="#b8480a" opacity="0.55">
        <ellipse cx="78" cy="118" rx="13" ry="8" transform="rotate(-18 78 118)" />
        <ellipse cx="122" cy="80" rx="9" ry="6" transform="rotate(24 122 80)" />
        <ellipse cx="112" cy="126" rx="6" ry="4" />
    </g>
    <circle cx="100" cy="100" r="62" fill="none" stroke="#ffe08a" stroke-opacity="0.45" stroke-width="2" />
</svg>
