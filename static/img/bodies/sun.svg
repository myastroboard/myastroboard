<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Sun">
    <defs>
        <radialGradient id="sun-disc" cx="42%" cy="38%" r="72%">
            <stop offset="0%" stop-color="#fff6cf" />
            <stop offset="45%" stop-color="#ffc93c" />
            <stop offset="85%" stop-color="#f3841c" />
            <stop offset="100%" stop-color="#d2540b" />
        </radialGradient>
        <radialGradient id="sun-corona" cx="50%" cy="50%" r="50%">
            <stop offset="55%" stop-color="#ffb02e" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#ffb02e" stop-opacity="0" />
        </radialGradient>
        <clipPath id="sun-clip">
            <circle cx="100" cy="100" r="62" />
