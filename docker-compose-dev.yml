services:
  myastroboard:
    # For development: build from source
    build: .
    # For production: use published image
    # image: worldofgz/myastroboard:latest
    container_name: myastroboard

    ports:
      - "5000:5000"

    volumes:
      - ./data:/app/data

    environment:
      # Timezone (affects log timestamps only — set observation timezone in Parameters → Configuration)
      # UTC is recommended for server deployments
      - TZ=UTC

      # Flask
      - FLASK_DEBUG=0  # 1 en debug

      # App data directory
      - DATA_DIR=/app/data

      # Security, reverse proxy, and push notification settings are managed
      # through the admin UI: Parameters → Advanced
      # They are stored in data/app_settings.json and persist across container rebuilds.

    restart: unless-stopped

    # No privileged mode for security
    privileged: false

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
